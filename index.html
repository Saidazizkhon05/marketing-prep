<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Marketing – Exam Prep</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0f14;color:#f1f5f9;min-height:100vh}
#site-brand{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(13,15,20,.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(192,132,252,.25);text-align:center;padding:6px 0;pointer-events:auto}
#site-brand a{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
#app{padding-top:33px}
button{cursor:pointer;font-family:inherit}
button:disabled{cursor:not-allowed;opacity:.5}
#app{min-height:100vh}

/* HOME */
.home{min-height:100vh;background:linear-gradient(160deg,#0d0f14 0%,#130a1f 60%,#0d0f14 100%);display:flex;flex-direction:column;align-items:center;padding:36px 18px 60px}
.home-inner{max-width:820px;width:100%}
.hero{text-align:center;margin-bottom:34px}
.hero-emoji{font-size:56px;margin-bottom:10px}
.hero-title{font-size:30px;font-weight:800;background:linear-gradient(135deg,#c084fc,#f472b6,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.hero-sub{color:#64748b;font-size:14px;margin-bottom:18px}
.hero-chips{display:flex;justify-content:center;gap:9px;flex-wrap:wrap}
.chip{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#94a3b8;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600}

/* quick banner */
.qb{background:linear-gradient(135deg,#2d1054,#1e0d3a);border:2px solid rgba(192,132,252,.3);border-radius:20px;padding:26px;margin-bottom:28px;cursor:pointer;transition:all .22s;position:relative;overflow:hidden}
.qb:hover{transform:translateY(-3px);box-shadow:0 14px 40px rgba(192,132,252,.2);border-color:rgba(192,132,252,.55)}
.qb-orb{position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:rgba(192,132,252,.08);border-radius:50%}
.qb-orb2{position:absolute;bottom:-35px;left:40px;width:100px;height:100px;background:rgba(244,114,182,.06);border-radius:50%}
.qb-row{display:flex;align-items:center;gap:16px;margin-bottom:12px}
.qb-ico{font-size:38px}
.qb-name{font-size:22px;font-weight:800;color:#fff}
.qb-desc{color:rgba(255,255,255,.6);font-size:13px;margin-top:2px}
.qb-tags{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
.qb-tag{background:rgba(192,132,252,.18);color:#d8b4fe;padding:3px 12px;border-radius:9px;font-size:12px;font-weight:700}
.qb-go{display:inline-block;background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff;border:none;border-radius:9px;padding:10px 28px;font-weight:800;font-size:14px}

.sec-lbl{color:#475569;font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;margin-bottom:13px;padding-left:2px}
.sec-wrap{margin-bottom:26px}

/* slots */
.slots-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:640px){.slots-grid{grid-template-columns:1fr 1fr}}
.slot-card{background:rgba(255,255,255,.04);border:2px solid rgba(192,132,252,.25);border-radius:14px;padding:16px 12px 14px;cursor:pointer;transition:all .2s;text-align:center;position:relative;overflow:hidden}
.slot-card:hover{transform:translateY(-2px);background:rgba(192,132,252,.08);border-color:rgba(192,132,252,.5)}
.slot-topbar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#c084fc,#f472b6)}
.slot-num{font-size:10px;font-weight:700;color:#c084fc;letter-spacing:.5px;margin-bottom:3px}
.slot-ico{font-size:22px;margin-bottom:3px}
.slot-title{font-size:13px;font-weight:700;color:#e2e8f0;margin-bottom:1px}
.slot-sub{color:#475569;font-size:10px;margin-bottom:8px}
.slot-score{font-size:10px;font-weight:700;padding:2px 9px;border-radius:6px;display:inline-block;margin-bottom:8px}
.ss-none{background:rgba(255,255,255,.06);color:#475569}
.ss-good{background:rgba(16,185,129,.15);color:#10b981}
.ss-ok{background:rgba(245,158,11,.15);color:#f59e0b}
.ss-bad{background:rgba(239,68,68,.15);color:#ef4444}
.slot-btn{background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff;border:none;border-radius:7px;padding:6px 0;font-weight:700;font-size:11px;width:100%}

/* mode cards */
.modes-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:480px){.modes-grid{grid-template-columns:1fr}}
.mode-card{background:rgba(255,255,255,.04);border-radius:15px;padding:20px 16px;cursor:pointer;transition:all .2s;border:2px solid transparent;position:relative;overflow:hidden}
.mode-card:hover{transform:translateY(-2px)}
.mc-bar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:15px 15px 0 0}
.mc-ico{font-size:26px;margin-bottom:8px}
.mc-name{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:3px}
.mc-range{color:#475569;font-size:11px;margin-bottom:9px}
.mc-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.mc-chip{padding:2px 9px;border-radius:8px;font-size:10px;font-weight:600}
.mc-btn{text-align:center;border-radius:8px;padding:8px 0;font-weight:700;font-size:13px;color:#fff}

/* TEST */
.test-screen{min-height:100vh;background:#0d0f14;display:flex;flex-direction:column}
.topbar{background:#111318;border-bottom:1px solid #1e2130;padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;gap:12px}
.tb-left{display:flex;align-items:center;gap:11px;min-width:0;flex:1}
.back-btn{background:none;border:none;color:#64748b;font-size:20px;padding:5px 8px;border-radius:7px;flex-shrink:0}
.back-btn:hover{background:#1e2130;color:#94a3b8}
.tb-info{min-width:0}
.tb-title{font-size:14px;font-weight:700;color:#f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-sub{font-size:11px;color:#475569;margin-top:1px}
.tb-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-left:6px;vertical-align:middle}
.b-real{background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff}
.b-slot{background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff}
.b-quiz{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.b-prac{background:rgba(192,132,252,.25);color:#d8b4fe;border:1px solid #c084fc}
.timer-block{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.timer-val{font-size:22px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}
.timer-rail{width:100px;height:4px;background:#1e2130;border-radius:3px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px;transition:width 1s linear,background 1s linear}
.sub-btn{border:none;border-radius:8px;padding:8px 16px;font-weight:700;font-size:13px;flex-shrink:0}
.sb-real,.sb-slot{background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff}
.sb-prac{background:#8b5cf6;color:#fff}

.test-body{max-width:780px;width:100%;margin:0 auto;padding:22px 18px;flex:1}
.qnav{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px}
.qn{width:33px;height:33px;border-radius:7px;font-size:11px;font-weight:700;border:2px solid #1e2130;background:#111318;color:#475569;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .12s}
.qn.p-cur{background:#8b5cf6;border-color:#a78bfa;color:#fff}
.qn.p-ans{background:#4c1d95;border-color:#8b5cf6;color:#c4b5fd}
.qn.v-cur{background:linear-gradient(135deg,#c084fc,#f472b6);border-color:#c084fc;color:#fff}
.qn.v-ans{background:#2d1054;border-color:#c084fc;color:#e9d5ff}
.qn.q-cur{background:linear-gradient(135deg,#f59e0b,#ef4444);border-color:#f59e0b;color:#fff}
.qn.q-ans{background:#451a03;border-color:#f59e0b;color:#fde68a}

.qbox{border-radius:16px;padding:26px;margin-bottom:18px;border:2px solid #1e2130;background:#111318}
.qbox.v-q{background:linear-gradient(135deg,#130a1f,#111318);border-color:rgba(192,132,252,.2)}
.qbox.quiz-q{background:linear-gradient(135deg,#1a1000,#111318);border-color:rgba(245,158,11,.2)}
.q-meta{font-size:11px;font-weight:700;color:#475569;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.q-pill{font-size:9px;font-weight:700;padding:2px 8px;border-radius:5px;letter-spacing:.4px}
.pill-v{background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff}
.pill-quiz{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.pill-p{background:rgba(139,92,246,.25);color:#c4b5fd;border:1px solid #8b5cf6}
.q-text{font-size:16px;line-height:1.72;color:#f1f5f9;font-weight:500}

.answers{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
.ans-btn{display:flex;align-items:flex-start;gap:13px;padding:13px 16px;background:#0d0f14;border:2px solid #1e2130;border-radius:12px;cursor:pointer;transition:all .13s;text-align:left;width:100%}
.ans-btn:hover:not(.locked){border-color:#2e3347;background:#141720}
.ans-btn.locked{cursor:default}
.ans-letter{min-width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:#1e2130;color:#475569;font-weight:700;font-size:13px;flex-shrink:0;transition:all .13s}
.ans-text{font-size:14px;line-height:1.55;color:#94a3b8;padding-top:4px}
.ans-btn.sel-p{background:#1e0f3a;border-color:#8b5cf6}
.ans-btn.sel-p .ans-letter{background:#8b5cf6;color:#fff}
.ans-btn.sel-p .ans-text{color:#e2e8f0}
.ans-btn.sel-v{background:#1a0830;border-color:#c084fc}
.ans-btn.sel-v .ans-letter{background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff}
.ans-btn.sel-v .ans-text{color:#e2e8f0}
.ans-btn.q-correct{background:rgba(16,185,129,.08);border-color:#10b981}
.ans-btn.q-correct .ans-letter{background:#10b981;color:#fff}
.ans-btn.q-correct .ans-text{color:#6ee7b7}
.ans-btn.q-wrong{background:rgba(239,68,68,.08);border-color:#ef4444}
.ans-btn.q-wrong .ans-letter{background:#ef4444;color:#fff}
.ans-btn.q-wrong .ans-text{color:#fca5a5}

.q-feedback{border-radius:13px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;gap:12px;font-size:15px;font-weight:600}
.q-feedback.correct{background:rgba(16,185,129,.1);border:2px solid #10b981;color:#6ee7b7}
.q-feedback.wrong{background:rgba(239,68,68,.1);border:2px solid #ef4444;color:#fca5a5}
.qfb-ico{font-size:22px}
.quiz-next-btn{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-weight:700;font-size:14px}

.nav-row{display:flex;justify-content:space-between;gap:10px}
.nav-prev{background:#1e2130;color:#e2e8f0;border:none;border-radius:10px;padding:11px 22px;font-weight:600;font-size:14px}
.nav-next{background:#8b5cf6;color:#fff;border:none;border-radius:10px;padding:11px 22px;font-weight:600;font-size:14px}
.nav-fin{color:#fff;border:none;border-radius:10px;padding:11px 22px;font-weight:700;font-size:14px}
.nav-fin.v{background:linear-gradient(135deg,#c084fc,#f472b6)}
.nav-fin.p{background:#10b981}

/* RESULTS */
.results{min-height:100vh;background:#0d0f14;padding:24px 18px}
.res-inner{max-width:680px;margin:0 auto}
.res-top{text-align:center;padding:32px 0 22px}
.res-ico{font-size:54px;margin-bottom:8px}
.res-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 12px;border-radius:7px;margin-bottom:10px;letter-spacing:.5px}
.rb-real,.rb-slot{background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff}
.rb-quiz{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.rb-prac{background:rgba(139,92,246,.2);border:1px solid #8b5cf6;color:#a78bfa}
.res-title{font-size:24px;font-weight:800;margin-bottom:5px}
.res-sub{color:#475569;font-size:14px}
.score-card{background:#111318;border-radius:20px;padding:28px;margin-bottom:16px;text-align:center;border:2px solid transparent}
.score-pct{font-size:70px;font-weight:800;line-height:1;letter-spacing:-2px}
.score-grade{font-size:20px;font-weight:700;margin:8px 0 20px}
.score-stats{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin-bottom:20px}
.stat-v{font-size:28px;font-weight:800}
.stat-l{color:#475569;font-size:12px;margin-top:2px}
.score-bar-bg{background:#0d0f14;border-radius:8px;height:12px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:8px;transition:width .6s ease}
.res-btns{display:flex;gap:11px;margin-bottom:11px}
.btn-review{flex:1;background:#1e2130;color:#e2e8f0;border:none;border-radius:12px;padding:14px 0;font-weight:600;font-size:14px}
.btn-retry{flex:1;color:#fff;border:none;border-radius:12px;padding:14px 0;font-weight:700;font-size:14px}
.br-real,.br-slot{background:linear-gradient(135deg,#c084fc,#f472b6)}
.br-quiz{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.br-prac{background:#8b5cf6}
.btn-home-out{width:100%;background:transparent;color:#475569;border:2px solid #1e2130;border-radius:12px;padding:12px 0;font-weight:600;font-size:14px}
.btn-home-out:hover{border-color:#2e3347;color:#64748b}

/* REVIEW */
.review{min-height:100vh;background:#0d0f14;padding:22px 18px}
.rev-inner{max-width:760px;margin:0 auto}
.rev-hdr{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.rev-title{font-size:20px;font-weight:700}
.rev-sub{color:#475569;font-size:12px}
.rq{background:#111318;border-radius:14px;padding:20px;margin-bottom:13px;border:2px solid transparent}
.rq-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px}
.rq-num{color:#475569;font-size:12px;font-weight:600}
.rq-tag{font-size:11px;font-weight:700;padding:2px 9px;border-radius:6px}
.rq-text{font-size:14px;line-height:1.65;color:#e2e8f0;font-weight:500;margin-bottom:12px}
.rq-opts{display:flex;flex-direction:column;gap:6px}
.ro{display:flex;align-items:flex-start;gap:9px;border-radius:9px;padding:9px 12px;border:1.5px solid #1e2130;background:#0d0f14}
.ro-l{font-weight:700;font-size:12px;min-width:20px;flex-shrink:0;color:#475569}
.ro-t{font-size:13px;line-height:1.5;color:#64748b}
.ro-ico{margin-left:auto;font-size:14px;flex-shrink:0}
.ro.correct{background:rgba(16,185,129,.08);border-color:#10b981}
.ro.correct .ro-l,.ro.correct .ro-t{color:#6ee7b7}
.ro.wrong{background:rgba(239,68,68,.08);border-color:#ef4444}
.ro.wrong .ro-l,.ro.wrong .ro-t{color:#fca5a5}
.btn-back-rev{width:100%;background:linear-gradient(135deg,#c084fc,#f472b6);color:#fff;border:none;border-radius:12px;padding:14px 0;font-weight:700;font-size:14px;margin-top:8px}
</style>
</head>
<body>
<div id="site-brand"><a href="https://saidaziz.uz" target="_blank">Saidaziz.uz</a></div>
<div id="app"></div>
<script>
const ALL_Q=[{"q":"Marketing is the activity, set of ___________ and processes for creating, communicating, delivering & exchanging offerings that have value for customers, clients, partners & society?","a":["Utilities","Organizations","Activities","Institutions"],"correct":3},{"q":"The key term in the American Marketing Association’s definition of marketing is?","a":["Value","Loyalty","Demand","Exchange"],"correct":0},{"q":"Choose correct definition of Want?","a":["Benefits exchanged in a market","Needs directed to the product","Products with high perceived value","Wants backed by purchasing power"],"correct":1},{"q":"_______ is the act of obtaining a desired object from someone by offering something in return?","a":["Distribution","Promotion","Exchange","Selling"],"correct":2},{"q":"State of felt deprivation including physical, social, and individual one known as _____?","a":["Market","Need","Want","Demand"],"correct":1},{"q":"Marketers often use the term ________ to cover various groupings of customers?","a":["Market","Segment","Industry","Distribution channel"],"correct":0},{"q":"Good marketing is no accident but a result of careful planning and _____?","a":["Segmentation","Research","Positioning","Execution"],"correct":3},{"q":"Marketing is a process which aims at ________?","a":["Selling existing products","Mass production efficiency","The satisfaction of customer needs","Profit maximization only"],"correct":2},{"q":"The term marketing refers to _______?","a":["A process focused only on advertising and promotion","We have organized our business to satisfy the customer needs","A philosophy that stresses customer value and satisfaction","A process of producing goods at the lowest cost"],"correct":2},{"q":"Most individuals want Mercedes-Benz car, only few are able to buy this is an example of …?","a":["Need","Demand","Market","Want"],"correct":1},{"q":"The best possible definition of marketing science given by P.Kotler is _______?","a":["The art and science of choosing target markets and getting, keeping, and growing customers through creating, delivering, and communicating superior customer value","Marketing is the activity, set of institutions & processes for creating, communicating, delivering & exchanging offerings that have value for customers, clients, partners & society","A business philosophy that assumes customers will buy any available product if the price is low and distribution is wide","Marketing is the process by which companies create value for customers & build strong customer relationships in order to capture value from customers in return"],"correct":3},{"q":"A place where goods are bought and sold against the price consideration between the buyers and the sellers is called ______?","a":["Market","Exchange","Distribution channel","Industry"],"correct":0},{"q":"_______ involves transfer of ownership of the goods?","a":["Dealers","Selling","Fantasy","Allowance"],"correct":1},{"q":"________ is not a type of Marketing Concept?","a":["Marketing concept","Product concept","Production concept","The supplier concept"],"correct":3},{"q":"Marketing mix for products consists of______?","a":["4Ps","STP","7Ps","PLC"],"correct":0},{"q":"_____ are the key elements of promotion mix?","a":["Product Value, Service Value, Image Value","Consumer Markets, Business Markets, Government Markets, Global Markets","Advertising, Sales Promotion, Public Relations, Direct Marketing","Advertising, Sales Promotion, Public Relations, Personal Selling"],"correct":2},{"q":"_______is not a part of marketing mix?","a":["Place","Promotion","Product","Purpose"],"correct":3},{"q":"The term marketing mix describes _______?","a":["Dividing the market into various groups of customers with distinct characteristics","Separating the market into different groups of customers with distinct characteristics","a blending of strategic elements to satisfy specific target markets","Customer identification and to identify the customer’s tastes and preferences"       let cls='ans-btn locked';
      if(ai===q.ci)cls+=' q-correct';
      else if(ai===ST.quizSelected)cls+=' q-wrong';
      return `<button class="${cls}"><span class="ans-letter">${LETTERS[ai]}</span><span class="ans-text">${esc(a)}</span></button>`;
    }).join('');
  }else{
    ansHtml=q.a.map((a,ai)=>{
      const sel=ST.sel[ST.cur]===ai;
      let cls='ans-btn';if(sel)cls+=isV?' sel-v':' sel-p';
      return `<button class="${cls}" onclick="selectAns(${ai})"><span class="ans-letter">${LETTERS[ai]}</span><span class="ans-text">${esc(a)}</span></button>`;
    }).join('');
  }

  let feedbackHtml='';
  if(isQ&&ST.quizAnswered){
    const ok=ST.quizSelected===q.ci;
    const isLast=ST.cur===total-1;
    feedbackHtml=`<div class="q-feedback ${ok?'correct':'wrong'}">
      <span class="qfb-ico">${ok?'🎉':'💡'}</span>
      <span>${ok?'Correct! Well done.':'Incorrect — correct answer shown in green.'}</span>
    </div>
    <div class="nav-row" style="justify-content:flex-end">
      <button class="quiz-next-btn" onclick="${isLast?'submitTest()':'quizNext()'}">${isLast?'See Results':'Next →'}</button>
    </div>`;
  }

  let navHtml='';
  if(!(isQ&&ST.quizAnswered)&&!isQ){
    const finCls=isV?'v':'p';
    const right=ST.cur<total-1
      ?`<button class="nav-next" onclick="gotoQ(${ST.cur+1})">Next →</button>`
      :`<button class="nav-fin ${finCls}" onclick="submitTest()">✓ Submit</button>`;
    navHtml=`<div class="nav-row">
      <button class="nav-prev" onclick="gotoQ(${ST.cur-1})" ${ST.cur===0?'disabled':''}>← Prev</button>
      ${right}
    </div>`;
  }
  if(isQ&&!ST.quizAnswered){
    navHtml=`<div class="nav-row">
      <button class="nav-prev" onclick="gotoQ(${ST.cur-1})" ${ST.cur===0?'disabled':''}>← Prev</button>
    </div>`;
  }

  const isReal=ST.mode==='real',isSlot=ST.mode==='slot';
  const modeName=isQ?`Quiz ${ST.grpIdx+1}`:isReal?'Quick Real Exam':isSlot?`Exam Slot #${ST.slotIdx+1}`:`Practice Test ${ST.grpIdx+1}`;
  const badgeCls=isQ?'b-quiz':isV?'b-real':'b-prac';
  const badgeLbl=isQ?'QUIZ':isReal?'REAL EXAM':isSlot?`SLOT ${ST.slotIdx+1}`:'PRACTICE';
  const qboxCls=isV?' v-q':isQ?' quiz-q':'';
  const pillCls=isV?'pill-v':isQ?'pill-quiz':'pill-p';
  const pillLbl=isReal?'REAL':isSlot?'SLOT':isQ?'QUIZ':'PRACTICE';
  const tColor=tc(ST.timeLeft);
  const tPct=(ST.timeLeft/TSEC*100).toFixed(1);
  const timerHtml=isQ
    ?`<div style="color:#475569;font-size:12px;font-weight:600">No Timer</div>`
    :`<div class="timer-block"><div class="timer-val" style="color:${tColor}">${fmt(ST.timeLeft)}</div><div class="timer-rail"><div class="timer-fill" style="width:${tPct}%;background:${tColor}"></div></div></div>`;
  const subBtnHtml=isQ?'':`<button class="sub-btn sb-${isV?'real':'prac'}" onclick="submitTest()">Submit</button>`;

  return `<div class="test-screen">
    <div class="topbar">
      <div class="tb-left">
        <button class="back-btn" onclick="goHome()">←</button>
        <div class="tb-info">
          <div class="tb-title">${modeName}<span class="tb-badge ${badgeCls}">${badgeLbl}</span></div>
          <div class="tb-sub">${answered}/${total} answered</div>
        </div>
      </div>
      ${timerHtml}
      ${subBtnHtml}
    </div>
    <div class="test-body">
      <div class="qnav">${nav}</div>
      <div class="qbox${qboxCls}">
        <div class="q-meta">QUESTION ${ST.cur+1} OF ${total}<span class="q-pill ${pillCls}">${pillLbl}</span></div>
        <p class="q-text">${esc(q.q)}</p>
      </div>
      <div class="answers">${ansHtml}</div>
      ${feedbackHtml}
      ${navHtml}
    </div>
  </div>`;
}

function buildResults(){
  const total=ST.shuffled.length,sc=ST.score;
  const pct=Math.round(sc/total*100);
  const gc=pct>=90?'#10b981':pct>=75?'#c084fc':pct>=60?'#f59e0b':'#ef4444';
  const grade=pct>=90?'Excellent 🏆':pct>=75?'Good Pass 👍':pct>=60?'Satisfactory ✔️':'Needs Practice 📖';
  const isQ=ST.mode==='quiz',isReal=ST.mode==='real',isSlot=ST.mode==='slot';
  const isV=isReal||isSlot;
  const modeName=isQ?`Quiz ${ST.grpIdx+1}`:isReal?'Quick Real Exam':isSlot?`Exam Slot #${ST.slotIdx+1}`:`Practice Test ${ST.grpIdx+1}`;
  const retakeFn=isQ?`startQuiz(${ST.grpIdx})`:isReal?'startReal()':isSlot?`startSlot(${ST.slotIdx})`:`startPractice(${ST.grpIdx})`;
  const retakeLbl=isQ?'🔄 Retry Quiz':isV?'🔄 New Exam':'🔄 Retake Test';
  const modeCls=isQ?'quiz':isV?'real':'prac';
  const modeLbl=isQ?'⚡ QUIZ MODE':isReal?'🎯 QUICK REAL EXAM':isSlot?'🎲 EXAM SLOT':'📋 PRACTICE TEST';
  return `<div class="results"><div class="res-inner">
    <div class="res-top">
      <div class="res-ico">${pct>=60?'🎉':'📖'}</div>
      <div class="res-badge rb-${modeCls}">${modeLbl}</div>
      <h2 class="res-title">${modeName} Complete</h2>
      <p class="res-sub">Your results are below</p>
    </div>
    <div class="score-card" style="border-color:${gc}35">
      <div class="score-pct" style="color:${gc}">${pct}%</div>
      <div class="score-grade" style="color:${gc}">${grade}</div>
      <div class="score-stats">
        <div><div class="stat-v" style="color:#10b981">${sc}</div><div class="stat-l">Correct</div></div>
        <div><div class="stat-v" style="color:#ef4444">${total-sc}</div><div class="stat-l">Wrong</div></div>
        <div><div class="stat-v" style="color:#64748b">${total}</div><div class="stat-l">Total</div></div>
      </div>
      <div class="score-bar-bg"><div class="score-bar-fill" style="width:${pct}%;background:${gc}"></div></div>
    </div>
    <div class="res-btns">
      <button class="btn-review" onclick="goReview()">📋 Review All</button>
      <button class="btn-retry br-${modeCls}" onclick="${retakeFn}">${retakeLbl}</button>
    </div>
    <button class="btn-home-out" onclick="goHome()">← Back to Home</button>
  </div></div>`;
}

function buildReview(){
  const total=ST.shuffled.length,sc=ST.score,pct=Math.round(sc/total*100);
  const isQ=ST.mode==='quiz',isReal=ST.mode==='real',isSlot=ST.mode==='slot';
  const modeName=isQ?`Quiz ${ST.grpIdx+1}`:isReal?'Quick Real Exam':isSlot?`Exam Slot #${ST.slotIdx+1}`:`Practice Test ${ST.grpIdx+1}`;
  const items=ST.shuffled.map((q,qi)=>{
    const ua=ST.sel[qi],ok=ua===q.ci,skip=ua===undefined;
    const lbl=ok?'✓ CORRECT':skip?'— SKIPPED':'✗ WRONG';
    const lc=ok?'#10b981':skip?'#64748b':'#ef4444';
    const lb=ok?'rgba(16,185,129,.12)':skip?'rgba(100,116,139,.1)':'rgba(239,68,68,.12)';
    const rows=q.a.map((a,ai)=>{
      const isC=ai===q.ci,isU=ai===ua&&!isC;
      let cls='ro';if(isC)cls+=' correct';else if(isU)cls+=' wrong';
      return `<div class="${cls}"><span class="ro-l">${LETTERS[ai]}</span><span class="ro-t">${esc(a)}</span>${isC?'<span class="ro-ico">✓</span>':isU?'<span class="ro-ico">✗</span>':''}</div>`;
    }).join('');
    return `<div class="rq" style="border-color:${lc}28">
      <div class="rq-top"><span class="rq-num">Q${qi+1}</span><span class="rq-tag" style="color:${lc};background:${lb}">${lbl}</span></div>
      <p class="rq-text">${esc(q.q)}</p>
      <div class="rq-opts">${rows}</div>
    </div>`;
  }).join('');
  return `<div class="review"><div class="rev-inner">
    <div class="rev-hdr">
      <button style="background:none;border:none;color:#64748b;font-size:22px;cursor:pointer;padding:4px 8px" onclick="goResults()">←</button>
      <div><div class="rev-title">${modeName} — Review</div><div class="rev-sub">${sc}/${total} correct · ${pct}%</div></div>
    </div>
    ${items}
    <button class="btn-back-rev" onclick="goResults()">← Back to Results</button>
  </div></div>`;
}

function startTimer(){
  if(ST.timer)clearInterval(ST.timer);
  ST.timer=setInterval(()=>{
    ST.timeLeft--;
    const tv=document.querySelector('.timer-val');
    const tf=document.querySelector('.timer-fill');
    const t=tc(ST.timeLeft);
    if(tv){tv.style.color=t;tv.textContent=fmt(ST.timeLeft);}
    if(tf){tf.style.width=(ST.timeLeft/TSEC*100).toFixed(1)+'%';tf.style.background=t;}
    if(ST.timeLeft<=0){clearInterval(ST.timer);doSubmit();}
  },1000);
}

window.startReal=()=>{if(ST.timer)clearInterval(ST.timer);ST={...ST,screen:'test',mode:'real',grpIdx:null,slotIdx:null,shuffled:prep(rnd25()),cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};render();startTimer();};
window.startSlot=(idx)=>{if(ST.timer)clearInterval(ST.timer);ST={...ST,screen:'test',mode:'slot',grpIdx:null,slotIdx:idx,shuffled:prep(rnd25()),cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};render();startTimer();};
window.startPractice=(idx)=>{if(ST.timer)clearInterval(ST.timer);ST={...ST,screen:'test',mode:'practice',grpIdx:idx,slotIdx:null,shuffled:prep(GROUPS[idx]),cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};render();startTimer();};
window.startQuiz=(idx)=>{if(ST.timer)clearInterval(ST.timer);ST={...ST,screen:'test',mode:'quiz',grpIdx:idx,slotIdx:null,shuffled:prep(GROUPS[idx]),cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};render();};
window.gotoQ=(i)=>{if(i<0||i>=ST.shuffled.length)return;ST.cur=i;if(ST.mode==='quiz'){ST.quizAnswered=ST.sel[i]!==undefined;ST.quizSelected=ST.sel[i]!==undefined?ST.sel[i]:-1;}render();if(ST.mode!=='quiz')startTimer();};
window.selectAns=(ai)=>{
  if(ST.mode==='quiz'){if(ST.quizAnswered)return;ST.sel={...ST.sel,[ST.cur]:ai};ST.quizAnswered=true;ST.quizSelected=ai;render();}
  else{
    ST.sel={...ST.sel,[ST.cur]:ai};
    const isV=ST.mode==='real'||ST.mode==='slot';
    const q=ST.shuffled[ST.cur];
    const cont=document.querySelector('.answers');
    if(cont){cont.innerHTML=q.a.map((a,idx)=>{const sel=ST.sel[ST.cur]===idx;let cls='ans-btn';if(sel)cls+=isV?' sel-v':' sel-p';return `<button class="${cls}" onclick="selectAns(${idx})"><span class="ans-letter">${LETTERS[idx]}</span><span class="ans-text">${esc(a)}</span></button>`;}).join('');}
    document.querySelectorAll('.qn').forEach((el,i)=>{el.className='qn';const iC=i===ST.cur,iA=ST.sel[i]!==undefined;if(isV){if(iC)el.classList.add('v-cur');else if(iA)el.classList.add('v-ans');}else{if(iC)el.classList.add('p-cur');else if(iA)el.classList.add('p-ans');}});
    const sub=document.querySelector('.tb-sub');if(sub)sub.textContent=Object.keys(ST.sel).length+'/'+ST.shuffled.length+' answered';
  }
};
window.quizNext=()=>{const next=ST.cur+1;if(next>=ST.shuffled.length){submitTest();return;}ST.cur=next;ST.quizAnswered=ST.sel[next]!==undefined;ST.quizSelected=ST.sel[next]!==undefined?ST.sel[next]:-1;render();};
window.submitTest=doSubmit;
function doSubmit(){if(ST.timer)clearInterval(ST.timer);let c=0;ST.shuffled.forEach((q,i)=>{if(ST.sel[i]===q.ci)c++;});ST.score=c;if(ST.mode==='slot'&&ST.slotIdx!==null)slotScores[ST.slotIdx]={c,t:ST.shuffled.length};ST.screen='results';render();}
window.goHome=()=>{if(ST.timer)clearInterval(ST.timer);ST.screen='home';render();};
window.goReview=()=>{ST.screen='review';render();};
window.goResults=()=>{ST.screen='results';render();};

render();
</script></body></html>
