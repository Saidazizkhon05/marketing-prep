<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Exam Prep</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d0f14;color:#f1f5f9;min-height:100vh}
#site-brand{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(13,15,20,.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(192,132,252,.25);text-align:center;padding:10px 0}
#site-brand a{font-size:17px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
.page{min-height:100vh;background:linear-gradient(160deg,#0d0f14 0%,#130a1f 60%,#0d0f14 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 18px 60px}
.hero{text-align:center;margin-bottom:48px}
.hero-emoji{font-size:60px;margin-bottom:14px}
.hero-title{font-size:34px;font-weight:800;background:linear-gradient(135deg,#c084fc,#f472b6,#fb923c);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.hero-sub{color:#64748b;font-size:15px}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:720px;width:100%}
@media(max-width:560px){.cards{grid-template-columns:1fr}}
.card{border-radius:22px;padding:32px 28px;cursor:pointer;text-decoration:none;display:block;position:relative;overflow:hidden;transition:transform .22s,box-shadow .22s;border:2px solid transparent}
.card:hover{transform:translateY(-5px)}
.card-m{background:linear-gradient(145deg,#1e0d3a,#2d1054);border-color:rgba(192,132,252,.3)}
.card-m:hover{box-shadow:0 18px 50px rgba(192,132,252,.25);border-color:rgba(192,132,252,.6)}
.card-a{background:linear-gradient(145deg,#0d1f3a,#0d2b54);border-color:rgba(96,165,250,.3)}
.card-a:hover{box-shadow:0 18px 50px rgba(96,165,250,.25);border-color:rgba(96,165,250,.6)}
.card-orb{position:absolute;top:-40px;right:-40px;width:140px;height:140px;border-radius:50%;opacity:.12}
.card-m .card-orb{background:#c084fc}
.card-a .card-orb{background:#60a5fa}
.card-ico{font-size:44px;margin-bottom:14px}
.card-title{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px}
.card-desc{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:20px;line-height:1.5}
.card-btn{display:inline-block;border:none;border-radius:10px;padding:10px 26px;font-weight:800;font-size:14px;color:#fff;cursor:pointer}
.card-m .card-btn{background:linear-gradient(135deg,#c084fc,#f472b6)}
.card-a .card-btn{background:linear-gradient(135deg,#60a5fa,#3b82f6)}
</style>
</head>
<body>
<div id="site-brand"><a href="https://saidaziz.uz" target="_blank">Saidaziz.uz</a></div>
<div class="page">
  <div class="hero">
    <div class="hero-emoji">🎓</div>
    <h1 class="hero-title">Exam Prep</h1>
    <p class="hero-sub">TSUE · 2025–2026 · Choose your subject</p>
  </div>
  <div class="cards">
    <a href="marketing.html" class="card card-m">
      <div class="card-orb"></div>
      <div class="card-ico">📣</div>
      <div class="card-title">Marketing</div>
      <div class="card-desc">4 study modes · 525 questions · timed exam simulation</div>
      <div class="card-btn">Start →</div>
    </a>
    <a href="accounting.html" class="card card-a">
      <div class="card-orb"></div>
      <div class="card-ico">📊</div>
      <div class="card-title">Accounting</div>
      <div class="card-desc">4 study modes · exam questions · timed exam simulation</div>
      <div class="card-btn">Start →</div>
    </a>
  </div>
</div>
</body>
</html>
