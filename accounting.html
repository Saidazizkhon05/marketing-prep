<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Accounting – Exam Prep</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh}
button{cursor:pointer;font-family:inherit}
button:disabled{cursor:not-allowed}
#site-brand{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(13,15,20,.85);backdrop-filter:blur(8px);border-bottom:1px solid rgba(192,132,252,.25);text-align:center;padding:10px 0}
#site-brand a{font-size:17px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;background:linear-gradient(135deg,#c084fc,#f472b6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-decoration:none}
#app{min-height:100vh;padding-top:45px}

/* HOME */
.home{display:flex;flex-direction:column;align-items:center;padding:40px 20px;background:linear-gradient(135deg,#0f172a 0%,#1a1230 100%);min-height:100vh}
.home-inner{max-width:780px;width:100%}
.home-header{text-align:center;margin-bottom:32px}
.home-icon{font-size:52px;margin-bottom:8px}
.home-title{font-size:28px;font-weight:700;color:#fff;margin-bottom:6px}
.home-sub{color:#94a3b8;font-size:15px;margin-bottom:16px}
.home-badges{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
.badge{background:rgba(255,255,255,.1);color:#cbd5e1;padding:5px 14px;border-radius:20px;font-size:13px}

/* Quick Real Exam banner */
.quick-banner{background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:20px;padding:26px 26px 22px;margin-bottom:24px;position:relative;overflow:hidden;cursor:pointer;transition:all .2s;border:2px solid rgba(255,255,255,.15)}
.quick-banner:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(124,58,237,.45)}
.qb-glow{position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:rgba(255,255,255,.07);border-radius:50%}
.qb-glow2{position:absolute;bottom:-30px;left:60px;width:90px;height:90px;background:rgba(255,255,255,.05);border-radius:50%}
.qb-top{display:flex;align-items:center;gap:14px;margin-bottom:12px}
.qb-icon{font-size:36px}
.qb-title{font-size:21px;font-weight:800;color:#fff}
.qb-desc{color:rgba(255,255,255,.78);font-size:13px;margin-top:2px}
.qb-tags{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:16px}
.qb-tag{background:rgba(255,255,255,.18);color:#fff;padding:3px 11px;border-radius:9px;font-size:12px;font-weight:600}
.qb-btn{background:rgba(255,255,255,.95);color:#7c3aed;border:none;border-radius:9px;padding:10px 26px;font-weight:800;font-size:14px;display:inline-block}

/* Section */
.sec-wrap{margin-bottom:24px}
.sec-label{color:#64748b;font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:12px;padding-left:2px}

/* Slot cards */
.slots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
@media(max-width:600px){.slots-grid{grid-template-columns:1fr 1fr}}
.slot-card{background:rgba(255,255,255,.05);border:2px solid #7c3aed;border-radius:13px;padding:16px 13px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;text-align:center}
.slot-card:hover{transform:translateY(-2px);background:rgba(124,58,237,.12)}
.slot-top-bar{position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7c3aed,#4f46e5)}
.slot-num{font-size:11px;font-weight:700;color:#c4b5fd;letter-spacing:.5px;margin-bottom:4px}
.slot-icon{font-size:22px;margin-bottom:4px}
.slot-title{font-size:14px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.slot-sub{color:#64748b;font-size:10px;margin-bottom:8px}
.slot-score{font-size:10px;font-weight:700;padding:2px 9px;border-radius:7px;display:inline-block;margin-bottom:8px}
.slot-score.none{background:rgba(255,255,255,.07);color:#475569}
.slot-score.good{background:#10b98120;color:#10b981}
.slot-score.ok{background:#f59e0b20;color:#f59e0b}
.slot-score.bad{background:#ef444420;color:#ef4444}
.slot-btn{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:7px;padding:6px 0;font-weight:700;font-size:12px;width:100%}

/* Test cards */
.tests-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.tests-grid{grid-template-columns:1fr}}
.test-card{background:rgba(255,255,255,.05);border-radius:14px;padding:20px 16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;border:2px solid transparent}
.test-card:hover{transform:translateY(-2px)}
.card-bar{position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0}
.card-icon{font-size:26px;margin-bottom:7px}
.card-title{font-size:16px;font-weight:700;color:#f1f5f9;margin-bottom:3px}
.card-range{color:#64748b;font-size:11px;margin-bottom:8px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.card-tag{padding:2px 9px;border-radius:9px;font-size:10px;font-weight:600}
.card-btn{text-align:center;border-radius:7px;padding:7px 0;font-weight:700;font-size:13px;color:#fff}

/* TEST SCREEN */
.test-screen{min-height:100vh;background:#0f172a}
.topbar{background:#1e293b;border-bottom:1px solid #334155;padding:11px 22px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.back-btn{background:none;border:none;color:#94a3b8;font-size:22px;padding:4px 8px;border-radius:6px}
.back-btn:hover{background:#334155}
.topbar-title{font-weight:700;font-size:15px}
.topbar-sub{color:#64748b;font-size:11px}
.topbar-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;margin-left:6px;vertical-align:middle;letter-spacing:.4px}
.badge-real{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.badge-slot{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.badge-quiz{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.timer-wrap{display:flex;flex-direction:column;align-items:center;gap:3px}
.timer-val{font-size:24px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}
.timer-bar-bg{width:110px;height:4px;background:#334155;border-radius:3px;overflow:hidden}
.timer-bar{height:100%;border-radius:3px;transition:width 1s linear}
.submit-btn{color:#fff;border:none;border-radius:8px;padding:8px 18px;font-weight:600;font-size:13px}
.submit-btn.practice{background:#3b82f6}
.submit-btn.real,.submit-btn.slot{background:linear-gradient(135deg,#7c3aed,#4f46e5)}

.test-body{max-width:760px;margin:0 auto;padding:24px 18px}
.qnav{display:flex;gap:4px;margin-bottom:24px;flex-wrap:wrap}
.qnav-btn{width:32px;height:32px;border-radius:6px;font-size:11px;font-weight:700;border:2px solid #334155;background:#1e293b;color:#64748b;transition:all .15s;display:flex;align-items:center;justify-content:center}
.qnav-btn.cur{background:#3b82f6;border-color:#60a5fa;color:#fff}
.qnav-btn.ans{background:#1d4ed8;border-color:#3b82f6;color:#93c5fd}
.qnav-btn.vcur{background:linear-gradient(135deg,#7c3aed,#4f46e5);border-color:#7c3aed;color:#fff}
.qnav-btn.vans{background:#3b0764;border-color:#7c3aed;color:#c4b5fd}
.qnav-btn.qcur{background:linear-gradient(135deg,#f59e0b,#ef4444);border-color:#f59e0b;color:#fff}
.qnav-btn.qans{background:#78350f;border-color:#f59e0b;color:#fde68a}

.qbox{background:#1e293b;border-radius:15px;padding:26px;margin-bottom:20px;border:1px solid #334155}
.qbox.violet-q{border-color:#7c3aed50;background:linear-gradient(135deg,#1e293b,#1a0e2e)}
.qbox.quiz-q{border-color:#f59e0b50;background:linear-gradient(135deg,#1e293b,#1c1500)}
.qnum{color:#64748b;font-size:12px;font-weight:600;margin-bottom:9px}
.mpill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;margin-left:7px;vertical-align:middle}
.mpill-violet{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.mpill-quiz{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.qtext{font-size:16px;line-height:1.7;color:#f1f5f9;font-weight:500}

.answers{display:flex;flex-direction:column;gap:10px;margin-bottom:26px}
.ans-btn{display:flex;align-items:flex-start;gap:13px;padding:14px 16px;background:#1e293b;border:2px solid #334155;border-radius:11px;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.ans-btn:hover:not(.locked){border-color:#475569}
.ans-btn.locked{cursor:default}
.ans-btn.sel-practice{background:#1d3461;border-color:#3b82f6}
.ans-btn.sel-violet{background:#200f3d;border-color:#7c3aed}
.ans-btn.quiz-correct{background:#10b98115;border-color:#10b981 !important}
.ans-btn.quiz-wrong{background:#ef444415;border-color:#ef4444 !important}
.ans-btn.quiz-reveal{background:#10b98115;border-color:#10b981 !important}
.ans-letter{min-width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;background:#0f172a;color:#64748b;font-weight:700;font-size:13px;flex-shrink:0;transition:all .15s}
.ans-btn.sel-practice .ans-letter{background:#3b82f6;color:#fff}
.ans-btn.sel-violet .ans-letter{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.ans-btn.quiz-correct .ans-letter{background:#10b981;color:#fff}
.ans-btn.quiz-wrong .ans-letter{background:#ef4444;color:#fff}
.ans-btn.quiz-reveal .ans-letter{background:#10b981;color:#fff}
.ans-text{line-height:1.55;font-size:14px;color:#cbd5e1;padding-top:3px}
.ans-btn.sel-practice .ans-text,.ans-btn.sel-violet .ans-text{color:#e2e8f0}
.ans-btn.quiz-correct .ans-text{color:#6ee7b7}
.ans-btn.quiz-wrong .ans-text{color:#fca5a5}
.ans-btn.quiz-reveal .ans-text{color:#6ee7b7}

.nav-row{display:flex;justify-content:space-between;gap:10px}
.nav-prev{background:#334155;color:#e2e8f0;border:none;border-radius:9px;padding:11px 22px;font-weight:600;font-size:14px}
.nav-prev:disabled{background:#1e293b;color:#475569}
.nav-next{background:#3b82f6;color:#fff;border:none;border-radius:9px;padding:11px 22px;font-weight:600;font-size:14px}
.nav-finish{background:#10b981;color:#fff;border:none;border-radius:9px;padding:11px 22px;font-weight:600;font-size:14px}
.nav-finish.v{background:linear-gradient(135deg,#7c3aed,#4f46e5)}

/* Quiz feedback */
.quiz-feedback{border-radius:12px;padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px;font-size:15px;font-weight:600}
.quiz-feedback.correct{background:#10b98120;border:2px solid #10b981;color:#6ee7b7}
.quiz-feedback.wrong{background:#ef444420;border:2px solid #ef4444;color:#fca5a5}
.quiz-next-btn{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;border:none;border-radius:9px;padding:11px 22px;font-weight:700;font-size:14px}

/* RESULTS */
.results{min-height:100vh;background:#0f172a;padding:22px}
.results-inner{max-width:700px;margin:0 auto}
.res-header{text-align:center;padding:36px 0 24px}
.res-icon{font-size:52px;margin-bottom:8px}
.res-mode-badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 11px;border-radius:7px;margin-bottom:10px;letter-spacing:.5px}
.res-mode-badge.practice{background:#3b82f620;border:1px solid #3b82f6;color:#60a5fa}
.res-mode-badge.violet{background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff}
.res-mode-badge.quiz{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff}
.res-title{font-size:24px;font-weight:700;margin-bottom:6px}
.res-sub{color:#64748b}
.score-card{background:#1e293b;border-radius:18px;padding:28px;margin-bottom:18px;text-align:center;border:2px solid transparent}
.score-pct{font-size:68px;font-weight:800;line-height:1}
.score-grade{font-size:20px;font-weight:700;margin:7px 0 18px}
.score-stats{display:flex;justify-content:center;gap:28px;flex-wrap:wrap;margin-bottom:18px}
.stat-val{font-size:26px;font-weight:700}
.stat-lbl{color:#64748b;font-size:12px}
.score-prog{background:#0f172a;border-radius:7px;height:11px;overflow:hidden;margin-top:3px}
.score-bar{height:100%;border-radius:7px}
.res-actions{display:flex;gap:11px;margin-bottom:12px}
.btn-review{flex:1;background:#334155;color:#e2e8f0;border:none;border-radius:11px;padding:13px 0;font-weight:600;font-size:14px}
.btn-retake{flex:1;color:#fff;border:none;border-radius:11px;padding:13px 0;font-weight:600;font-size:14px}
.btn-retake.practice{background:#3b82f6}
.btn-retake.violet{background:linear-gradient(135deg,#7c3aed,#4f46e5)}
.btn-retake.quiz{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.btn-home{width:100%;background:transparent;color:#64748b;border:2px solid #334155;border-radius:11px;padding:11px 0;font-weight:600;font-size:14px}
.btn-home:hover{border-color:#475569;color:#94a3b8}

/* REVIEW */
.review{min-height:100vh;background:#0f172a;padding:22px}
.review-inner{max-width:740px;margin:0 auto}
.review-header{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.review-title{font-size:20px;font-weight:700}
.review-sub{color:#64748b;font-size:12px}
.rq{background:#1e293b;border-radius:13px;padding:20px;margin-bottom:14px;border:2px solid transparent}
.rq-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.rq-num{color:#64748b;font-size:12px;font-weight:600}
.rq-status{font-size:11px;font-weight:700;padding:2px 9px;border-radius:7px}
.rq-text{font-size:14px;line-height:1.6;color:#e2e8f0;font-weight:500;margin-bottom:12px}
.rq-answers{display:flex;flex-direction:column;gap:6px}
.ra{display:flex;align-items:flex-start;gap:9px;border-radius:8px;padding:9px 12px;border:1.5px solid #334155;background:#0f172a}
.ra-letter{font-weight:700;font-size:12px;min-width:20px;flex-shrink:0;color:#64748b}
.ra-text{font-size:13px;line-height:1.5;color:#94a3b8}
.ra.c{background:#10b98115;border-color:#10b981}
.ra.c .ra-letter,.ra.c .ra-text{color:#6ee7b7}
.ra.w{background:#ef444415;border-color:#ef4444}
.ra.w .ra-letter,.ra.w .ra-text{color:#fca5a5}
.ra-icon{margin-left:auto;font-size:15px;flex-shrink:0}
.btn-back-res{width:100%;background:linear-gradient(135deg,#7c3aed,#4f46e5);color:#fff;border:none;border-radius:11px;padding:13px 0;font-weight:600;font-size:14px;margin-top:7px}
</style>
</head>
<body>
<div id="site-brand"><a href="https://saidaziz.uz" target="_blank">Saidaziz.uz</a></div>
<div id="app"></div>
<script>
const ALL_Q=[{"q":"The accounting process does not include:","a":["Purchasing","Reporting","Interpreting","Observing"],"correct":0},{"q":"The financial statement or statements that pertain to a stated period of time is (are) the:","a":["Income statement","Balance sheet and journals","Balance sheet and income statement","Balance sheet"],"correct":0},{"q":"Where are expenses reported in financial statements?","a":["Income statement","Statement of owner’s equity","Balance sheet","Statement of owner’s equity and Balance sheet"],"correct":0},{"q":"This account does not appear on the income statement:","a":["Accumulated depreciation","Depreciation expense","Sales revenue","Marketing and distribution expense"],"correct":0},{"q":"A brand new company has a building costing $10,000, machinery costing $5,000, cash of $700, and a bank loan of $7,850. What is the owner’s equity?","a":["$7,850","$15,700","$7,750","$8,850"],"correct":0},{"q":"If a company has owner’s equity of $100,000,","a":["Assets minus liabilities equal $100,000","Total assets must equal $100,000","Net income for the past year was $100,000","A total of $100,000 was invested by the owner"],"correct":0},{"q":"Providing services on account for $40,000 would:","a":["Increase accounts receivable $40,000, increase owner’s equity $40,000","Increase cash $40,000, decrease accounts receivable $40,000","Decrease accounts receivable $40,000, decrease owner’s equity $40,000","Increase accounts receivable $40,000, decrease owner’s equity $40,000"],"correct":0},{"q":"New Font Software provided services for customers of $7,000. What is the entry if it billed customers for the total amount?","a":["Debit accounts receivable $7,000; credit service revenue $7,000","Debit notes receivable $7,000; credit service revenue $7,000","Debit cash $7,000; credit service revenue $7,000","Debit Service Revenue $7,000; Credit Unearned Revenue $7,000 and Credit Accounts Receivable"],"correct":0},{"q":"Current Landscaping paid salaries of $560 in cash. The accounting entry is:","a":["Debit salaries expense $560; credit cash $560","Debit salaries expense $560; credit salaries payable $560","Debit cash $560; credit salaries expense $560","Debit accounts payable $560; credit cash $560"],"correct":0},{"q":"The Philip Company received a bill for natural gas. The bill is for $550 and is payable in 30 days. The accounting entry is:","a":["Debit accounts receivable $550; credit service revenue $550","Debit accounts payable $550; credit cash $550","Debit natural gas expense $550; credit accounts payable $550","Debit Natural Gas Expense $550; Credit Cash $550 and Credit Accounts Payable $550"],"correct":2},{"q":"The following includes the accounts of the Perry Company on December 31. What is the total on the trial balance? Accounts Receivable $1,000, Cash 4,500, Equipment 4,000, Salaries Expense 1,600, Revenue Earned 2,800, Rent Expense 200, Supplies Expense 250, Drawing Account 300, Advertising Expense 50, Accounts Payable 3,050, Capital Account 6,050","a":["$11,900","$12,000","$9,100","$11,600"],"correct":0},{"q":"Which of the following transactions require a compound journal entry?","a":["An owner invests personal cash in his/her business","Purchase of $ 100 of supplies; some cash and the rest on account","Purchase three kinds of supplies for cash","Received cash from customers as payment for services provided earlier and recorded as"],"correct":1},{"q":"A truck was purchased on July 1 for $20,000. The estimated salvage value is $2,000. The estimated useful life is 3 years. Using straight-line method of depreciation, the amount of depreciation in the adjusting entry at fiscal year-end on December 31 is:","a":["Dr. Depreciation expense-truck $555.56 Cr. Accumulated depreciation-truck $555.56","Dr. Accumulated depreciation- truck $1,500 Cr. Depreciation expense- truck $1,500","Dr. Depreciation expense- truck $500 Cr. Accumulated depreciation- truck $500","Dr. Depreciation expense- truck $3,000 Cr. Accumulated Depreciation-Truck 3,000"],"correct":3},{"q":"A company paid in advance $4,800 for two years of prepaid insurance, which started on May 1. The adjusting entry on fiscal year ending December 31 of that year is:","a":["Debit insurance expense; credit prepaid insurance, $1,200","Debit insurance expense; credit prepaid insurance, $ 800","Debit prepaid insurance; credit insurance expense account, $1,600","Debit insurance expense; credit prepaid insurance, $1,600"],"correct":3},{"q":"On December 1 a company purchased supplies for $1,300. On December 31, an actual physical inventory showed that $800 of supplies were on hand The closing adjusting entry is:","a":["Debit supplies expense; credit supplies on hand, $800","Debit supplies expense; credit supplies on hand, $1,300","Debit supplies expense; credit supplies on hand, $500","Debit Supplies on Hand; Credit Cash account, $500"],"correct":2},{"q":"What is the first step in the accounting cycle?","a":["Prepare financial statements","Post journal entries to the individual accounts in the general ledger to update account balances","Trial balance","Analyze transactions by examining source documents"],"correct":3},{"q":"An example of an adjusting entry for deferred items is:","a":["Expense to asset","Asset to expense","Revenue to liability","Liability to expense"],"correct":1},{"q":"From a merchandiser’s income statement, you know that Sales Revenue is $ 650,000 and the gross margin is 20%. What is the Cost of Goods Sold?","a":["$650,000","$130,000","$26,000","$520,000"],"correct":3},{"q":"A manufacturer has beginning and ending finished goods inventory of $70, 000 and $90,000, respectively. Also, the purchase is $200,000. What is the Cost of Goods Sold?","a":["$20,000","$70,000","$180,000","$270,000"],"correct":2},{"q":"When a plant asset is retired from productive service and has no salvage value, originally cost $50,000, and had accumulated depreciation of $40,000, the correct accounting treatment is:","a":["Dr.Plant asset $50,000 Cr.Accumulated depreciation $40,000 Cr.Loss on plant assets $10,000","Dr.Loss on plant assets $10,000 Dr.Accumulated depreciation 40,000 Cr.Plant asset $50,000","Dr.Loss on plant asset $10,000 Cr Plant assets $10,000","Nothing. The firm still has it."],"correct":1},{"q":"Brooks Company consumed a natural resource in the amount of $5,000 during the current Accounting period. What would be the journal to record the using up of this resource?","a":["Depletion expense $5,000/Accumulated depletion $5,000","Depletion expense $5,000/Cash $5,000","Depletion expense $5,000/Depletable asset $5,000","Accumulated Depletion $5,000/Depletion Expense $5,000"],"correct":0},{"q":"Smith. Corp. sold 100 shares of $50 par value common stock for $70 per share. What would be the correct journal entry to record the transaction?","a":["Dr. Cash $7,000, Cr. Common stock $7,000","Dr. Cash $7,000, Cr. Common stock $5,000, Cr. Paid in capital $2,000","Dr. Common stock $7,000, Cr. Cash $7,000","Dr. Cash $7,000, Cr. Common Stock $2,000, Cr. Paid in Capital $5,000"],"correct":1},{"q":"Brooks Co. declared and paid a cash dividend of $5,000. What would be the journal entries?","a":["Dr. Retained earnings $5,000 Cr. Cash account $5,000, Dr. Retained earnings $5,000 Cr.","Dividends payable $5,000","Dr. Dividends payable $5,000, Cr Cash $5,000","Dr. Retained earnings 5,000, Cr. Dividends payable 5,000"],"correct":4},{"q":"What is the maximum life that the intangible asset patent value can be amortized?","a":["The asset’s legal life","The useful life","20 years","40 years"],"correct":2},{"q":"A company is being sued for $100,000. What would be recorded on the balance sheet?","a":["Nothing","$100,000 Set-aside Cash","$100,000 Liability","$100,000 Contingent Liability"],"correct":0},{"q":"Which one of the following represents the expanded basic accounting equation?","a":["Assets = Liabilities + Owner’s capital + Owner’s drawings – Revenue – Expenses","Assets + Owner’s drawings + Expenses = Liabiliti le $1,500; Credit Machine $1,500","Debit Cash $7,500; Credit Machine $6,000; Credit Gain on Sale $1,500","Debit Machine $6,000; Credit Cash $7,500"],"correct":2},{"q":"At year-end, supplies with a book balance of $2,000 show a physical count of $1,300 remaining. What is the correct adjusting entry?","a":["Debit Supplies $700; Credit Supplies Expense $700","Debit Cash $700; and Credit Supplies $700","Debit Supplies Expense $700; Credit Supplies $700","Debit Accounts Payable $700; and Credit Supplies $700"],"correct":2},{"q":"A company’s inventory records show ending inventory of $18,000, but a physical count shows $16,500. What is the journal entry to adjust inventory?","a":["Debit Inventory $1,500; Credit Cost of Goods Sold $1,500","Debit Cost of Goods Sold $1,500; Credit Accounts Payable $1,500","Debit Cost of Goods Sold $1,500; Credit Inventory $1,500","Debit Inventory $1,500; Credit Sales Revenue $1,500"],"correct":2},{"q":"A company received $9,600 on 1 November for 12 months’ rent in advance and credited it to Unearned Rent Revenue. On 31 December, what adjusting entry is required?","a":["Debit Rent Expense $1,600; and Credit Unearned Rent Revenue $1,600","Debit Unearned Rent Revenue $1,600; Credit Rent Revenue $1,600","Debit Cash $1,600; and Credit Rent Revenue $1,600","Debit Rent Revenue $9,600; Credit Unearned Rent Revenue $9,600"],"correct":1},{"q":"Which of the following transactions would be classified as a financing activity in the statement of cash flows?","a":["Purchase of equipment for cash","Payment of salaries","Issuing ordinary shares for cash","Receipt from customers"],"correct":2},{"q":"Services worth $2,000 were performed but not yet billed at year-end. What is the adjusting entry?","a":["Debit Cash $2,000; Credit Revenue $2,000","Debit Revenue $2,000; Credit Accounts Receivable $2,000","Debit Accounts Receivable $2,000; Credit Revenue $2,000","Debit Unearned Revenue $2,000; Credit Revenue $2,000"],"correct":2},{"q":"If total assets are $90,000 and total liabilities are $35,000, what is the owner’s equity?","a":["$55,000","$125,000","$35,000","$90,000"],"correct":0},{"q":"A company has current assets of $40,000 and current liabilities of $25,000; what is the working capital?","a":["$15,000","$65,000","$25,000","$40,000"],"correct":0},{"q":"If a business buys equipment for $5,000 cash, what is the effect on total assets?","a":["Total assets increase","Total assets decrease","Total assets remain the same","Liabilities increase and total assets decrease"],"correct":2},{"q":"A company reports total assets of $150,000 and owner’s equity of $100,000; what are total liabilities?","a":["$250,000","$50,000","$100,000","$150,000"],"correct":1},{"q":"A company has the following information for the year: Beginning Inventory = $8,000, Purchases = $25,000, Ending Inventory = $6,000. What is the Cost of Goods Sold (COGS)?","a":["$19,000","$27,000","$23,000","$31,000"],"correct":1}];
const GROUPS=[];for(let i=0;i<ALL_Q.length;i+=25)GROUPS.push(ALL_Q.slice(i,i+25));
const LETTERS=["A","B","C","D"];
const TSEC=45*60;
const COLORS=["#7c3aed","#4f46e5","#0284c7","#0d9488","#16a34a","#d97706","#dc2626","#9333ea","#0891b2","#65a30d","#e11d48","#f59e0b"];

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function rnd25(){return shuffle([...ALL_Q]).slice(0,25);}
function shuffleQ(q){const idx=shuffle([0,1,2,3].slice(0,q.a.length));return{q:q.q,a:idx.map(i=>q.a[i]),ci:idx.indexOf(q.correct)};}
function prep(pool){return shuffle(pool).map(shuffleQ);}
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")}
function tc(t){return t>600?"#22c55e":t>180?"#f59e0b":"#ef4444"}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

let ST={screen:"home",mode:"practice",grpIdx:null,slotIdx:null,shuffled:[],cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};
const slotScores=[null,null,null,null,null];

function render(){document.getElementById("app").innerHTML=buildHTML();}
function buildHTML(){
  if(ST.screen==="home")return buildHome();
  if(ST.screen==="test")return buildTest();
  if(ST.screen==="results")return buildResults();
  if(ST.screen==="review")return buildReview();
  return "";
}

function buildHome(){
  const slots=slotScores.map((sc,i)=>{
    let sh,scls;
    if(!sc){sh="Not attempted yet";scls="none";}
    else{const p=Math.round(sc.c/sc.t*100);sh=`Last: ${sc.c}/${sc.t} (${p}%)`;scls=p>=75?"good":p>=60?"ok":"bad";}
    return `<div class="slot-card" onclick="startSlot(${i})">
      <div class="slot-top-bar"></div>
      <div class="slot-num">EXAM SLOT #${i+1}</div>
      <div class="slot-icon">🎲</div>
      <div class="slot-title">Attempt ${i+1}</div>
      <div class="slot-sub">25 random · 45 min</div>
      <div class="slot-score ${scls}">${sh}</div>
      <button class="slot-btn">Start →</button>
    </div>`;
  }).join("");

  const practice=GROUPS.map((g,i)=>{
    const c=COLORS[i%COLORS.length];
    const s=i*25+1,e=s+g.length-1;
    return `<div class="test-card" onclick="startPractice(${i})" style="border-color:${c}40"
      onmouseover="this.style.background='${c}18'" onmouseout="this.style.background='rgba(255,255,255,.05)'">
      <div class="card-bar" style="background:${c}"></div>
      <div class="card-icon">📋</div>
      <div class="card-title">Practice Test ${i+1}</div>
      <div class="card-range">Q${s}–Q${e} · shuffled each time</div>
      <div class="card-tags">
        <span class="card-tag" style="background:${c}22;color:${c}">${g.length} questions</span>
        <span class="card-tag" style="background:rgba(255,255,255,.08);color:#94a3b8">⏱️ 45 min</span>
      </div>
      <div class="card-btn" style="background:${c}">Start →</div>
    </div>`;
  }).join("");

  const quiz=GROUPS.map((g,i)=>{
    const s=i*25+1,e=s+g.length-1;
    return `<div class="test-card" onclick="startQuiz(${i})" style="border-color:#f59e0b40"
      onmouseover="this.style.background='rgba(245,158,11,.1)'" onmouseout="this.style.background='rgba(255,255,255,.05)'">
      <div class="card-bar" style="background:linear-gradient(90deg,#f59e0b,#ef4444)"></div>
      <div class="card-icon">⚡</div>
      <div class="card-title">Quiz ${i+1}</div>
      <div class="card-range">Q${s}–Q${e} · instant feedback</div>
      <div class="card-tags">
        <span class="card-tag" style="background:rgba(245,158,11,.2);color:#f59e0b">${g.length} questions</span>
        <span class="card-tag" style="background:rgba(255,255,255,.08);color:#94a3b8">No timer</span>
      </div>
      <div class="card-btn" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">Start Quiz →</div>
    </div>`;
  }).join("");

  return `<div class="home"><div class="home-inner">
    <div class="home-header">
      <div class="home-icon">📒</div>
      <h1 class="home-title">Accounting – Exam Prep</h1>
      <p class="home-sub">TSUE · 2025–2026 · 300 Questions</p>
      <div class="home-badges">
        <span class="badge">📝 ${ALL_Q.length} Questions</span>
        <span class="badge">🗂️ ${GROUPS.length} Groups of 25</span>
        <span class="badge">4 Modes</span>
      </div>
    </div>

    <div class="quick-banner" onclick="startReal()">
      <div class="qb-glow"></div><div class="qb-glow2"></div>
      <div class="qb-top">
        <div class="qb-icon">🎯</div>
        <div>
          <div class="qb-title">Quick Real Exam</div>
          <div class="qb-desc">25 questions picked randomly from all ${ALL_Q.length} — unique every time</div>
        </div>
      </div>
      <div class="qb-tags">
        <span class="qb-tag">🎲 Random 25 from ${ALL_Q.length}</span>
        <span class="qb-tag">⏱️ 45 minutes</span>
        <span class="qb-tag">⚡ One click</span>
      </div>
      <div class="qb-btn">▶ Start Now</div>
    </div>

    <div class="sec-wrap">
      <div class="sec-label">🎲 Exam Attempt Slots — 25 random from all ${ALL_Q.length}, score tracked</div>
      <div class="slots-grid">${slots}</div>
    </div>

    <div class="sec-wrap">
      <div class="sec-label">⚡ Quiz Mode — answer and instantly see ✓ correct or ✗ wrong</div>
      <div class="tests-grid">${quiz}</div>
    </div>

    <div class="sec-wrap">
      <div class="sec-label">📋 Practice Tests — timed 45 min, submit to see full results</div>
      <div class="tests-grid">${practice}</div>

  </div></div>`;
}

function buildTest(){
  const isQ=ST.mode==="quiz";
  const isV=ST.mode==="real"||ST.mode==="slot";
  const q=ST.shuffled[ST.cur];
  const total=ST.shuffled.length;
  const t=tc(ST.timeLeft);
  const pct=(ST.timeLeft/TSEC*100).toFixed(1);

  const nav=ST.shuffled.map((_,i)=>{
    let cls="qnav-btn";
    if(isQ){if(i===ST.cur)cls+=" qcur";else if(ST.sel[i]!==undefined)cls+=" qans";}
    else if(isV){if(i===ST.cur)cls+=" vcur";else if(ST.sel[i]!==undefined)cls+=" vans";}
    else{if(i===ST.cur)cls+=" cur";else if(ST.sel[i]!==undefined)cls+=" ans";}
    return `<button class="${cls}" onclick="gotoQ(${i})">${i+1}</button>`;
  }).join("");

  let ansHtml="";
  if(isQ&&ST.quizAnswered){
    ansHtml=q.a.map((a,ai)=>{
      let cls="ans-btn locked";
      if(ai===q.ci)cls+=" quiz-reveal";
      else if(ai===ST.quizSelected&&ai!==q.ci)cls+=" quiz-wrong";
      return `<button class="${cls}"><span class="ans-letter">${LETTERS[ai]}</span><span class="ans-text">${esc(a)}</span></button>`;
    }).join("");
  } else {
    ansHtml=q.a.map((a,ai)=>{
      const sel=ST.sel[ST.cur]===ai;
      let cls="ans-btn";if(sel){cls+=isV?" sel-violet":" sel-practice";}
      return `<button class="${cls}" onclick="selectAns(${ai})"><span class="ans-letter">${LETTERS[ai]}</span><span class="ans-text">${esc(a)}</span></button>`;
    }).join("");
  }

  let feedbackHtml="";
  if(isQ&&ST.quizAnswered){
    const ok=ST.quizSelected===q.ci;
    const nextLabel=ST.cur<total-1?"Next Question →":"See Results";
    const nextCall=ST.cur<total-1?"quizNext()":"submitTest()";
    feedbackHtml=`<div class="quiz-feedback ${ok?"correct":"wrong"}">
      <span style="font-size:20px">${ok?"🎉":"💡"}</span>
      <span>${ok?"✓ Correct! Well done.":"✗ Incorrect. Correct answer highlighted in green."}</span>
    </div>
    <div class="nav-row" style="justify-content:flex-end">
      <button class="quiz-next-btn" onclick="${nextCall}">${nextLabel}</button>
    </div>`;
  }

  let navRowHtml="";
  if(!isQ||!ST.quizAnswered){
    if(!isQ){
      const finCls=isV?" v":"";
      const rightBtn=ST.cur<total-1
        ?`<button class="nav-next" onclick="gotoQ(${ST.cur+1})">Next →</button>`
        :`<button class="nav-finish${finCls}" onclick="submitTest()">✓ Finish</button>`;
      navRowHtml=`<div class="nav-row">
        <button class="nav-prev" onclick="gotoQ(${ST.cur-1})" ${ST.cur===0?"disabled":""}>← Previous</button>
        ${rightBtn}
      </div>`;
    }
  }

  const isReal=ST.mode==="real",isSlot=ST.mode==="slot";
  const modeName=isQ?`Quiz ${ST.grpIdx+1}`:isReal?"Quick Real Exam":isSlot?`Exam Slot #${ST.slotIdx+1}`:`Practice Test ${ST.grpIdx+1}`;
  const badgeCls=isQ?"quiz":isV?"real":"";
  const badgeLabel=isQ?"QUIZ":isReal?"REAL EXAM":isSlot?`SLOT ${ST.slotIdx+1}`:"";
  const badgeHtml=badgeCls?`<span class="topbar-badge badge-${badgeCls}">${badgeLabel}</span>`:"";
  const qboxCls=isV?" violet-q":isQ?" quiz-q":"";
  const pillCls=isV?"mpill mpill-violet":isQ?"mpill mpill-quiz":"";
  const pillLabel=isReal?"REAL":isSlot?"SLOT":isQ?"QUIZ":"";
  const pillHtml=pillCls?`<span class="${pillCls}">${pillLabel}</span>`:"";
  const submitCls=isV?"real":"practice";
  const timerHtml=isQ?`<div style="color:#64748b;font-size:13px;font-weight:600">No Timer</div>`:`<div class="timer-wrap"><div class="timer-val" style="color:${t}">${fmt(ST.timeLeft)}</div><div class="timer-bar-bg"><div class="timer-bar" style="width:${pct}%;background:${t}"></div></div></div>`;

  return `<div class="test-screen">
    <div class="topbar">
      <div class="topbar-left">
        <button class="back-btn" onclick="goHome()">←</button>
        <div>
          <div class="topbar-title">${modeName}${badgeHtml}</div>
          <div class="topbar-sub">${Object.keys(ST.sel).length}/${total} answered</div>
        </div>
      </div>
      ${timerHtml}
      ${isQ?"":`<button class="submit-btn ${submitCls}" onclick="submitTest()">Submit</button>`}
    </div>
    <div class="test-body">
      <div class="qnav">${nav}</div>
      <div class="qbox${qboxCls}">
        <div class="qnum">QUESTION ${ST.cur+1} OF ${total}${pillHtml}</div>
        <p class="qtext">${esc(q.q)}</p>
      </div>
      <div class="answers">${ansHtml}</div>
      ${feedbackHtml}
      ${navRowHtml}
    </div>
  </div>`;
}

function buildResults(){
  const total=ST.shuffled.length,sc=ST.score;
  const pct=Math.round(sc/total*100);
  const grade=pct>=90?"Excellent 🏆":pct>=75?"Good 👍":pct>=60?"Satisfactory ✔️":"Needs More Practice 📖";
  const gc=pct>=90?"#10b981":pct>=75?"#3b82f6":pct>=60?"#f59e0b":"#ef4444";
  const isQ=ST.mode==="quiz",isReal=ST.mode==="real",isSlot=ST.mode==="slot";
  const isV=isReal||isSlot;
  const modeName=isQ?`Quiz ${ST.grpIdx+1}`:isReal?"Quick Real Exam":isSlot?`Exam Slot #${ST.slotIdx+1}`:`Practice Test ${ST.grpIdx+1}`;
  const retakeCall=isQ?`startQuiz(${ST.grpIdx})`:isReal?"startReal()":isSlot?`startSlot(${ST.slotIdx})`:`startPractice(${ST.grpIdx})`;
  const retakeLabel=isQ?"🔄 Retry Quiz":isV?"🔄 New Random Exam":"🔄 Retake Test";
  const modeCls=isQ?"quiz":isV?"violet":"practice";
  const modeLabel=isQ?"⚡ QUIZ MODE":isReal?"🎯 QUICK REAL EXAM":isSlot?"🎲 EXAM SLOT":"📋 PRACTICE TEST";
  return `<div class="results"><div class="results-inner">
    <div class="res-header">
      <div class="res-icon">${pct>=60?"🎉":"📖"}</div>
      <div class="res-mode-badge ${modeCls}">${modeLabel}</div>
      <h2 class="res-title">${modeName} Complete</h2>
      <p class="res-sub">Here are your results</p>
    </div>
    <div class="score-card" style="border-color:${gc}40">
      <div class="score-pct" style="color:${gc}">${pct}%</div>
      <div class="score-grade" style="color:${gc}">${grade}</div>
      <div class="score-stats">
        <div><div class="stat-val" style="color:#10b981">${sc}</div><div class="stat-lbl">Correct</div></div>
        <div><div class="stat-val" style="color:#ef4444">${total-sc}</div><div class="stat-lbl">Wrong</div></div>
        <div><div class="stat-val" style="color:#94a3b8">${total}</div><div class="stat-lbl">Total</div></div>
      </div>
      <div class="score-prog"><div class="score-bar" style="width:${pct}%;background:${gc}"></div></div>
    </div>
    <div class="res-actions">
      <button class="btn-review" onclick="goReview()">📋 Review Answers</button>
      <button class="btn-retake ${modeCls}" onclick="${retakeCall}">${retakeLabel}</button>
    </div>
    <button class="btn-home" onclick="goHome()">← Back to Home</button>
  </div></div>`;
}

function buildReview(){
  const total=ST.shuffled.length,sc=ST.score;
  const pct=Math.round(sc/total*100);
  const isQ=ST.mode==="quiz",isReal=ST.mode==="real",isSlot=ST.mode==="slot";
  const modeName=isQ?`Quiz ${ST.grpIdx+1}`:isReal?"Quick Real Exam":isSlot?`Exam Slot #${ST.slotIdx+1}`:`Practice Test ${ST.grpIdx+1}`;
  const items=ST.shuffled.map((q,qi)=>{
    const ua=ST.sel[qi];
    const ok=ua===q.ci,skip=ua===undefined;
    const lbl=ok?"✓ CORRECT":skip?"— SKIPPED":"✗ WRONG";
    const lc=ok?"#10b981":skip?"#94a3b8":"#ef4444";
    const lb=ok?"#10b98120":skip?"#47556920":"#ef444420";
    const rows=q.a.map((a,ai)=>{
      const isC=ai===q.ci,isU=ai===ua;
      let cls="ra";if(isC)cls+=" c";else if(isU&&!isC)cls+=" w";
      const icon=isC?"✓":isU&&!isC?"✗":"";
      return `<div class="${cls}"><span class="ra-letter">${LETTERS[ai]}</span><span class="ra-text">${esc(a)}</span>${icon?`<span class="ra-icon">${icon}</span>`:""}</div>`;
    }).join("");
    return `<div class="rq" style="border-color:${lc}30">
      <div class="rq-top"><span class="rq-num">Q${qi+1}</span><span class="rq-status" style="color:${lc};background:${lb}">${lbl}</span></div>
      <p class="rq-text">${esc(q.q)}</p>
      <div class="rq-answers">${rows}</div>
    </div>`;
  }).join("");
  return `<div class="review"><div class="review-inner">
    <div class="review-header">
      <button style="background:none;border:none;color:#94a3b8;font-size:22px;cursor:pointer" onclick="goResults()">←</button>
      <div><div class="review-title">${modeName} — Review</div><div class="review-sub">Score: ${sc}/${total} (${pct}%)</div></div>
    </div>
    ${items}
    <button class="btn-back-res" onclick="goResults()">← Back to Results</button>
  </div></div>`;
}

function startTimer(){
  if(ST.timer)clearInterval(ST.timer);
  ST.timer=setInterval(()=>{
    ST.timeLeft--;
    const tv=document.querySelector(".timer-val");
    const tb=document.querySelector(".timer-bar");
    const t=tc(ST.timeLeft);
    if(tv){tv.style.color=t;tv.textContent=fmt(ST.timeLeft);}
    if(tb){tb.style.width=(ST.timeLeft/TSEC*100).toFixed(1)+"%";tb.style.background=t;}
    if(ST.timeLeft<=0){clearInterval(ST.timer);doSubmit();}
  },1000);
}

window.startPractice=function(idx){
  if(ST.timer)clearInterval(ST.timer);
  ST={...ST,screen:"test",mode:"practice",grpIdx:idx,slotIdx:null,shuffled:prep(GROUPS[idx]),cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};
  render();startTimer();
};
window.startReal=function(){
  if(ST.timer)clearInterval(ST.timer);
  ST={...ST,screen:"test",mode:"real",grpIdx:null,slotIdx:null,shuffled:prep(rnd25()),cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};
  render();startTimer();
};
window.startSlot=function(idx){
  if(ST.timer)clearInterval(ST.timer);
  ST={...ST,screen:"test",mode:"slot",grpIdx:null,slotIdx:idx,shuffled:prep(rnd25()),cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};
  render();startTimer();
};
window.startQuiz=function(idx){
  if(ST.timer)clearInterval(ST.timer);
  ST={...ST,screen:"test",mode:"quiz",grpIdx:idx,slotIdx:null,shuffled:prep(GROUPS[idx]),cur:0,sel:{},timeLeft:TSEC,score:null,timer:null,quizAnswered:false,quizSelected:-1};
  render();
};

window.gotoQ=function(i){
  if(i<0||i>=ST.shuffled.length)return;
  ST.cur=i;
  if(ST.mode==="quiz"){ST.quizAnswered=ST.sel[i]!==undefined;ST.quizSelected=ST.sel[i]!==undefined?ST.sel[i]:-1;}
  render();
  if(ST.mode!=="quiz")startTimer();
};

window.selectAns=function(ai){
  if(ST.mode==="quiz"){
    if(ST.quizAnswered)return;
    ST.sel={...ST.sel,[ST.cur]:ai};
    ST.quizAnswered=true;ST.quizSelected=ai;
    render();
  } else {
    ST.sel={...ST.sel,[ST.cur]:ai};
    const isV=ST.mode==="real"||ST.mode==="slot";
    const container=document.querySelector(".answers");
    if(container){
      const q=ST.shuffled[ST.cur];
      container.innerHTML=q.a.map((a,idx)=>{
        const sel=ST.sel[ST.cur]===idx;
        let cls="ans-btn";if(sel){cls+=isV?" sel-violet":" sel-practice";}
        return `<button class="${cls}" onclick="selectAns(${idx})"><span class="ans-letter">${LETTERS[idx]}</span><span class="ans-text">${esc(a)}</span></button>`;
      }).join("");
      document.querySelectorAll(".qnav-btn").forEach((d,i)=>{
        d.className="qnav-btn";
        const iC=i===ST.cur,iA=ST.sel[i]!==undefined;
        if(isV){if(iC)d.classList.add("vcur");else if(iA)d.classList.add("vans");}
        else{if(iC)d.classList.add("cur");else if(iA)d.classList.add("ans");}
      });
      const sub=document.querySelector(".topbar-sub");
      if(sub)sub.textContent=Object.keys(ST.sel).length+"/"+ST.shuffled.length+" answered";
    }
  }
};

window.quizNext=function(){
  const next=ST.cur+1;
  if(next>=ST.shuffled.length){submitTest();return;}
  ST.cur=next;
  ST.quizAnswered=ST.sel[next]!==undefined;
  ST.quizSelected=ST.sel[next]!==undefined?ST.sel[next]:-1;
  render();
};

window.submitTest=doSubmit;
function doSubmit(){
  if(ST.timer)clearInterval(ST.timer);
  let c=0;
  ST.shuffled.forEach((q,i)=>{if(ST.sel[i]===q.ci)c++;});
  ST.score=c;
  if(ST.mode==="slot"&&ST.slotIdx!==null)slotScores[ST.slotIdx]={c,t:ST.shuffled.length};
  ST.screen="results";render();
}
window.goHome=function(){if(ST.timer)clearInterval(ST.timer);ST.screen="home";render();};
window.goReview=function(){ST.screen="review";render();};
window.goResults=function(){ST.screen="results";render();};

render();
</script>
</body>
